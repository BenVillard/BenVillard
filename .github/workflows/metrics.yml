name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── Card 1: General Stats ────────────────────────────────────────────
      - name: Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          user: BenVillard
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/New_York   # adjust to your timezone

      # ── Card 2: Languages (indepth = scans private repos too) ────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: BenVillard
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes        # clones repos & scans commits — sees private
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 10
          commits_authoring: Ben Villard, BenVillard, bkvillard@gmail.com, b.016434@gmail.com, benvillard@users.noreply.github.com, ben@xylemtech.com, benjamin.villard@eng.ox.ac.uk
  
      # ── Card 3: achievements  ────────────
      - name: Compact display
        uses: lowlighter/metrics@latest
        with:
          user: BenVillard
          filename: metrics.plugin.achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_only: >-
            polyglot, stargazer, sponsor, deployer, member, maintainer, developer,
            scripter, packager, explorer, infographile, manager
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

      - name: Icons
        uses: lowlighter/metrics@latest
        with:
          user: BenVillard
          filename: metrics.plugin.topics.icons.svg
          token: NOT_NEEDED
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons



          

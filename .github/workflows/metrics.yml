name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── Card 1: General Stats ────────────────────────────────────────────
      - name: Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          user: BenVillard
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/New_York   # adjust to your timezone

      # ── Card 2: Languages (indepth = scans private repos too) ────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: BenVillard
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes        # clones repos & scans commits — sees private
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 8
          commits_authoring: Ben Villard, BenVillard, benvillard@users.noreply.github.com, ben@xylemtech.com, benjamin.villard@eng.ox.ac.uk

      # ── Card 3: Isometric Contribution Calendar ──────────────────────────
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: BenVillard
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
